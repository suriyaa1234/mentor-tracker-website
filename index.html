<!DOCTYPE html>
<html>
<head>
    <title>Mentor Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Mentor–Student Interaction Tracking</h1>

    <div class="form">
        <input type="text" id="student" placeholder="Student Name">
        <input type="text" id="message" placeholder="Interaction Message">

        <button onclick="saveData()">Save</button>
        <button onclick="clearAll()">Clear All</button>
    </div>

    <h2>Interaction Records</h2>

    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Message</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
</div>

<script src="script.js"></script>

</body>
</html>
